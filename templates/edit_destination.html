{% extends 'base.html' %}

{% block title %}Edit {{ destination.name }} - Travel & Tourism Portal{% endblock %}

{% block content %}
<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <h1>Edit Destination</h1>
        <p>Update destination details</p>
    </div>
</section>

<!-- Edit Destination Section -->
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">
                        <h3 class="mb-4">Edit: {{ destination.name }}</h3>
                        
                        <form id="destinationForm" method="POST" action="{{ url_for('edit_destination', destination_id=destination.id) }}">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="name" class="form-label">Destination Name</label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="name" 
                                               name="name" 
                                               value="{{ destination.name }}"
                                               required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="location" class="form-label">Location</label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="location" 
                                               name="location" 
                                               value="{{ destination.location }}"
                                               required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" 
                                          id="description" 
                                          name="description" 
                                          rows="4" 
                                          required>{{ destination.description }}</textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="price" class="form-label">Price (per person)</label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input type="number" 
                                                   class="form-control" 
                                                   id="price" 
                                                   name="price" 
                                                   value="{{ destination.price }}"
                                                   step="0.01"
                                                   min="0"
                                                   required>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="package_type" class="form-label">Package Type</label>
                                        <select class="form-select" id="package_type" name="package_type">
                                            <option value="Standard" {{ 'selected' if destination.package_type == 'Standard' else '' }}>Standard</option>
                                            <option value="Premium" {{ 'selected' if destination.package_type == 'Premium' else '' }}>Premium</option>
                                            <option value="Luxury" {{ 'selected' if destination.package_type == 'Luxury' else '' }}>Luxury</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="image" class="form-label">Image URL</label>
                                <input type="url" 
                                       class="form-control" 
                                       id="image" 
                                       name="image" 
                                       value="{{ destination.image }}">
                                <small class="text-muted">Leave empty to use default image</small>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-arrow-left me-2"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
